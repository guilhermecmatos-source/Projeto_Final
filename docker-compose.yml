services:
  mysql:
    image: mysql:8.0
    container_name: fleet_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-fleet_db}
      MYSQL_USER: ${MYSQL_USER:-fleet_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-fleet_pass}
      TZ: America/Sao_Paulo
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent",
        ]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 30s

  backend:
    build: ./backend
    container_name: fleet_backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      HOST: 0.0.0.0
      DATABASE_URL: mysql://${MYSQL_USER:-fleet_user}:${MYSQL_PASSWORD:-fleet_pass}@mysql:3306/${MYSQL_DATABASE:-fleet_db}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${MYSQL_USER:-fleet_user}
      DB_PASSWORD: ${MYSQL_PASSWORD:-fleet_pass}
      DB_NAME: ${MYSQL_DATABASE:-fleet_db}
      JWT_SECRET: ${JWT_SECRET:-fleet-platform-jwt-secret-dev}
      NODE_ENV: development
      DB_WAIT_RETRIES: 60
      DB_WAIT_INTERVAL: 2
      SERVER_DB_RETRIES: 30
      GEO_PROVIDER_ORDER: google,osm,qualp,mapeia,heuristic
      TZ: America/Sao_Paulo
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3001/health').then(r=>r.json()).then(j=>process.exit(j.status==='ok'?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s
    volumes:
      - ./backend/src:/app/src
      - backend_uploads:/app/uploads
    entrypoint: ["sh", "/app/docker-entrypoint.sh"]

  frontend:
    build: ./frontend
    container_name: fleet_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      BACKEND_URL: http://backend:3001
      INTERNAL_API_URL: http://backend:3001
      NEXT_PUBLIC_API_URL: /api
      WAIT_RETRIES: 90
      WAIT_INTERVAL: 2
      TZ: America/Sao_Paulo
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    entrypoint: ["sh", "/app/docker-entrypoint.sh"]

volumes:
  mysql_data: {}
  backend_uploads: {}