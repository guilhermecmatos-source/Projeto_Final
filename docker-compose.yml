services:
  mysql:
    image: mysql:8.0
    container_name: fleet_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-fleet_db}
      MYSQL_USER: ${MYSQL_USER:-fleet_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-fleet_pass}
      TZ: America/Sao_Paulo
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  backend:
    build: ./backend
    container_name: fleet_backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${MYSQL_USER:-fleet_user}
      DB_PASSWORD: ${MYSQL_PASSWORD:-fleet_pass}
      DB_NAME: ${MYSQL_DATABASE:-fleet_db}
      JWT_SECRET: ${JWT_SECRET:-fleet-platform-jwt-secret-dev}
      NODE_ENV: development
      TZ: America/Sao_Paulo
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
    command: sh -c "npm run db:migrate && npm run dev"

  frontend:
    build: ./frontend
    container_name: fleet_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001/api
      TZ: America/Sao_Paulo
    depends_on:
      - backend

volumes:
  mysql_data:
